# nginx site config for shopping-list-v3 (HTTP-only — certbot adds HTTPS).
#
# Install:
#   1. Replace <DOMAIN> below with your real hostname (e.g. shop.example.com).
#   2. sudo cp deploy/nginx/shopping-list.conf /etc/nginx/sites-available/shopping-list
#   3. sudo ln -s /etc/nginx/sites-available/shopping-list \
#                 /etc/nginx/sites-enabled/shopping-list
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. sudo certbot --nginx -d <DOMAIN> --redirect
#
# Step 5 rewrites this file in place: it adds `listen 443 ssl http2`,
# the ssl_certificate paths, and a separate :80 → :443 redirect server
# block. After that it auto-renews via the certbot.timer systemd timer.
#
# The Express BFF on :4000 serves both /api/* and the bundled Vite SPA,
# so a single proxy block covers everything (SPA fallback included — the
# BFF returns index.html for unknown non-/api paths).

server {
    listen 80;
    listen [::]:80;
    server_name <DOMAIN>;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Sync push payload size — bigger than typical because users may
        # bulk-add items while offline. Matches the Express body limit.
        client_max_body_size 2m;
    }
}
